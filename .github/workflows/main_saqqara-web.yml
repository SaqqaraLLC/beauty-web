name: Build and deploy Next.js to Azure Web App - saqqara-web

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.saqqarallc.com

      - name: Prepare standalone package
        run: |
          cp -r .next/standalone ./deploy
          cp -r .next/static ./deploy/.next/static
          cp -r public ./deploy/public
          cp Web.config ./deploy/Web.config
          cp iisnode-wrapper.js ./deploy/iisnode-wrapper.js
          # Rename standalone server.js so our wrapper can require it
          mv ./deploy/server.js ./deploy/nextjs-server.js

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-app
          path: ./deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-app
          path: ./deploy

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_59E4F369A0EB4D71BAA29E5CA8427775 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1D6D3B02C022448193A845B5FB58CB26 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1BFD2A013FBE4D058232697C33958D9D }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'saqqara-web'
          slot-name: 'Production'
          package: ./deploy

      - name: Set Azure App Settings
        uses: azure/appservice-settings@v1
        with:
          app-name: 'saqqara-web'
          app-settings-json: |
            [
              { "name": "WEBSITE_NODE_DEFAULT_VERSION", "value": "~20" },
              { "name": "NODE_ENV", "value": "production" },
              { "name": "NEXT_PUBLIC_API_URL", "value": "https://api.saqqarallc.com" }
            ]
