<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="c">
      <circle cx="32" cy="32" r="31"/>
    </clipPath>
    <filter id="gold">
      <feColorMatrix type="matrix"
        values="0.5 0.3 0   0 0.35
                0.3 0.2 0   0 0.22
                0   0   0   0 0.04
                0   0   0   1 0"/>
    </filter>
  </defs>
  <!-- White background -->
  <circle cx="32" cy="32" r="32" fill="white"/>
  <!-- PNG cropped to show just the QQ, clipped to circle -->
  <image href="/assets/assets/logo/Tab-Logo.png"
    x="-78" y="-66" width="401" height="401"
    clip-path="url(#c)" filter="url(#gold)"/>
  <!-- Gold ring border -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#C9A84C" stroke-width="1"/>
</svg>
