<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420">
  <defs>

    <!-- Metallic gold gradients -->
    <linearGradient id="goldMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FDF0B0"/>
      <stop offset="28%"  stop-color="#C9A030"/>
      <stop offset="58%"  stop-color="#F0D870"/>
      <stop offset="100%" stop-color="#6A4208"/>
    </linearGradient>

    <linearGradient id="goldVertical" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FDF0B0"/>
      <stop offset="38%"  stop-color="#C9A030"/>
      <stop offset="100%" stop-color="#6A4208"/>
    </linearGradient>

    <linearGradient id="stemSheen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6A4208"/>
      <stop offset="28%"  stop-color="#C9A030"/>
      <stop offset="52%"  stop-color="#FDF0B0"/>
      <stop offset="76%"  stop-color="#C9A030"/>
      <stop offset="100%" stop-color="#6A4208"/>
    </linearGradient>

    <linearGradient id="leftHandGrad" x1="0%" y1="0%" x2="100%" y2="85%">
      <stop offset="0%"   stop-color="#FDF0B0"/>
      <stop offset="45%"  stop-color="#C9A030"/>
      <stop offset="100%" stop-color="#6A4208"/>
    </linearGradient>

    <linearGradient id="rightHandGrad" x1="100%" y1="0%" x2="0%" y2="85%">
      <stop offset="0%"   stop-color="#FDF0B0"/>
      <stop offset="45%"  stop-color="#C9A030"/>
      <stop offset="100%" stop-color="#6A4208"/>
    </linearGradient>

    <!-- Gold glow: blur → gold flood → merge under original -->
    <filter id="goldGlow" x="-45%" y="-45%" width="190%" height="190%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="11" result="blur"/>
      <feFlood flood-color="#C9A030" flood-opacity="0.72" result="glowColor"/>
      <feComposite in="glowColor" in2="blur" operator="in" result="coloredGlow"/>
      <feMerge>
        <feMergeNode in="coloredGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Tighter glow for lotus crown only -->
    <filter id="crownGlow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feFlood flood-color="#FDF0B0" flood-opacity="0.55" result="glowColor"/>
      <feComposite in="glowColor" in2="blur" operator="in" result="coloredGlow"/>
      <feMerge>
        <feMergeNode in="coloredGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ─────────────────────────────────────── -->
  <!--  OUTER GLOW LAYER (blurred silhouette)  -->
  <!-- ─────────────────────────────────────── -->
  <g filter="url(#goldGlow)" opacity="0.45">
    <!-- Left hand silhouette for glow -->
    <path d="M 112,338
             C 86,314 86,272 92,258
             C 88,254 84,252 88,257
             C 92,254 104,247 114,246
             Q 114,240 118,238 Q 121,234 125,241
             Q 128,235 133,233 Q 137,229 140,235
             Q 144,230 150,228 Q 153,225 157,231
             Q 162,228 167,227 Q 170,227 174,232
             C 181,241 190,253 200,260
             L 200,313 Q 177,326 153,333 Q 130,339 112,338 Z"
          fill="#C9A84C"/>
    <!-- Right hand silhouette for glow -->
    <path d="M 288,338
             C 314,314 314,272 308,258
             C 312,254 316,252 312,257
             C 308,254 296,247 286,246
             Q 286,240 282,238 Q 279,234 275,241
             Q 272,235 267,233 Q 263,229 260,235
             Q 256,230 250,228 Q 247,225 243,231
             Q 238,228 233,227 Q 230,227 226,232
             C 219,241 210,253 200,260
             L 200,313 Q 223,326 247,333 Q 270,339 288,338 Z"
          fill="#C9A84C"/>
    <!-- Stem + lotus body -->
    <line x1="200" y1="174" x2="200" y2="306" stroke="#C9A84C" stroke-width="10"/>
    <ellipse cx="200" cy="142" rx="36" ry="54" fill="#C9A84C"/>
  </g>

  <!-- ─────────────────────────────────────── -->
  <!--  LEFT HAND  — 4 finger bumps + thumb   -->
  <!-- ─────────────────────────────────────── -->
  <!--
    Outer edge: wrist → outer palm → thumb protrusion (outer bump)
    Fingers inner→outer: index, middle (tallest), ring, pinky
    Reading path left-to-right as it traces the silhouette:
      wrist → outer palm → thumb bump → finger base →
      pinky tip → valley → ring tip → valley → middle tip → valley → index tip →
      web → center stem → down inner edge → bottom palm → wrist
  -->
  <path d="M 112,338
           C 86,314 86,272 92,258
           C 88,254 84,252 88,257
           C 92,254 104,247 114,246
           Q 114,240 118,238
           Q 121,234 125,241
           Q 128,235 133,233
           Q 137,229 140,235
           Q 144,230 150,228
           Q 153,225 157,231
           Q 162,228 167,227
           Q 170,227 174,232
           C 181,241 190,253 200,260
           L 200,313
           Q 177,326 153,333
           Q 130,339 112,338 Z"
        fill="url(#leftHandGrad)"
        stroke="#FDF0B0" stroke-width="0.7" stroke-opacity="0.45"/>

  <!-- ─────────────────────────────────────── -->
  <!--  RIGHT HAND  — mirror of left          -->
  <!-- ─────────────────────────────────────── -->
  <path d="M 288,338
           C 314,314 314,272 308,258
           C 312,254 316,252 312,257
           C 308,254 296,247 286,246
           Q 286,240 282,238
           Q 279,234 275,241
           Q 272,235 267,233
           Q 263,229 260,235
           Q 256,230 250,228
           Q 247,225 243,231
           Q 238,228 233,227
           Q 230,227 226,232
           C 219,241 210,253 200,260
           L 200,313
           Q 223,326 247,333
           Q 270,339 288,338 Z"
        fill="url(#rightHandGrad)"
        stroke="#FDF0B0" stroke-width="0.7" stroke-opacity="0.45"/>

  <!-- ─────────────────────────────────────── -->
  <!--  FINGER DEFINITION LINES               -->
  <!--  Dark shadow lines in each valley      -->
  <!-- ─────────────────────────────────────── -->
  <!-- Left hand: pinky/ring, ring/middle, middle/index valleys -->
  <path d="M 125,241 C 124,247 123,253 122,259" stroke="#4A2C08" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.55"/>
  <path d="M 140,235 C 139,241 138,247 137,253" stroke="#4A2C08" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.55"/>
  <path d="M 157,231 C 156,237 155,243 154,249" stroke="#4A2C08" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.55"/>
  <!-- Right hand valleys (mirrored) -->
  <path d="M 275,241 C 276,247 277,253 278,259" stroke="#4A2C08" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.55"/>
  <path d="M 260,235 C 261,241 262,247 263,253" stroke="#4A2C08" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.55"/>
  <path d="M 243,231 C 244,237 245,243 246,249" stroke="#4A2C08" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.55"/>

  <!-- ─────────────────────────────────────── -->
  <!--  FINGERTIP HIGHLIGHTS                  -->
  <!--  Bright catch-light at each peak       -->
  <!-- ─────────────────────────────────────── -->
  <!-- Left hand: pinky, ring, middle, index -->
  <circle cx="121" cy="234" r="1.7" fill="#FDF0B0" opacity="0.62"/>
  <circle cx="135" cy="229" r="1.9" fill="#FDF0B0" opacity="0.65"/>
  <circle cx="152" cy="225" r="2.1" fill="#FDF0B0" opacity="0.72"/>
  <circle cx="168" cy="227" r="1.9" fill="#FDF0B0" opacity="0.65"/>
  <!-- Right hand: pinky, ring, middle, index -->
  <circle cx="279" cy="234" r="1.7" fill="#FDF0B0" opacity="0.62"/>
  <circle cx="265" cy="229" r="1.9" fill="#FDF0B0" opacity="0.65"/>
  <circle cx="248" cy="225" r="2.1" fill="#FDF0B0" opacity="0.72"/>
  <circle cx="232" cy="227" r="1.9" fill="#FDF0B0" opacity="0.65"/>

  <!-- ─────────────────────────────────────── -->
  <!--  STEM                                   -->
  <!-- ─────────────────────────────────────── -->
  <path d="M200,306 C200,274 200,232 200,174"
        stroke="url(#stemSheen)" stroke-width="6.5" fill="none" stroke-linecap="round"/>

  <!-- ─────────────────────────────────────── -->
  <!--  BRANCHES  (3 pairs)                    -->
  <!-- ─────────────────────────────────────── -->
  <path d="M200,273 C189,267 177,259 161,251" stroke="url(#goldMetal)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M200,273 C211,267 223,259 239,251" stroke="url(#goldMetal)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M200,245 C188,239 173,230 154,220" stroke="url(#goldMetal)" stroke-width="3.8" fill="none" stroke-linecap="round"/>
  <path d="M200,245 C212,239 227,230 246,220" stroke="url(#goldMetal)" stroke-width="3.8" fill="none" stroke-linecap="round"/>
  <path d="M200,217 C192,211 181,205 167,198" stroke="url(#goldMetal)" stroke-width="3.1" fill="none" stroke-linecap="round"/>
  <path d="M200,217 C208,211 219,205 233,198" stroke="url(#goldMetal)" stroke-width="3.1" fill="none" stroke-linecap="round"/>

  <!-- ─────────────────────────────────────── -->
  <!--  LEAVES  (teardrop ellipses)            -->
  <!-- ─────────────────────────────────────── -->
  <ellipse cx="153" cy="247" rx="17" ry="9.5" fill="url(#goldMetal)" stroke="#FDF0B0" stroke-width="0.55" stroke-opacity="0.55" transform="rotate(-33 153 247)"/>
  <ellipse cx="247" cy="247" rx="17" ry="9.5" fill="url(#goldMetal)" stroke="#FDF0B0" stroke-width="0.55" stroke-opacity="0.55" transform="rotate(33 247 247)"/>
  <ellipse cx="146" cy="215" rx="15.5" ry="8.5" fill="url(#goldMetal)" stroke="#FDF0B0" stroke-width="0.55" stroke-opacity="0.55" transform="rotate(-37 146 215)"/>
  <ellipse cx="254" cy="215" rx="15.5" ry="8.5" fill="url(#goldMetal)" stroke="#FDF0B0" stroke-width="0.55" stroke-opacity="0.55" transform="rotate(37 254 215)"/>
  <ellipse cx="160" cy="192" rx="13.5" ry="7.5" fill="url(#goldMetal)" stroke="#FDF0B0" stroke-width="0.55" stroke-opacity="0.55" transform="rotate(-29 160 192)"/>
  <ellipse cx="240" cy="192" rx="13.5" ry="7.5" fill="url(#goldMetal)" stroke="#FDF0B0" stroke-width="0.55" stroke-opacity="0.55" transform="rotate(29 240 192)"/>

  <!-- ─────────────────────────────────────── -->
  <!--  LOTUS CROWN  (5 petals)               -->
  <!-- ─────────────────────────────────────── -->
  <g filter="url(#crownGlow)">
    <ellipse cx="172" cy="160" rx="9.5" ry="23" fill="url(#goldMetal)"   stroke="#FDF0B0" stroke-width="0.55" stroke-opacity="0.6" transform="rotate(-33 172 160)"/>
    <ellipse cx="228" cy="160" rx="9.5" ry="23" fill="url(#goldMetal)"   stroke="#FDF0B0" stroke-width="0.55" stroke-opacity="0.6" transform="rotate(33 228 160)"/>
    <ellipse cx="186" cy="148" rx="9.5" ry="25" fill="url(#goldVertical)" stroke="#FDF0B0" stroke-width="0.6"  stroke-opacity="0.7" transform="rotate(-15 186 148)"/>
    <ellipse cx="214" cy="148" rx="9.5" ry="25" fill="url(#goldVertical)" stroke="#FDF0B0" stroke-width="0.6"  stroke-opacity="0.7" transform="rotate(15 214 148)"/>
    <ellipse cx="200" cy="142" rx="11"  ry="31"  fill="url(#goldVertical)" stroke="#FDF0B0" stroke-width="0.7"  stroke-opacity="0.85"/>
  </g>

  <!-- Stamen / center jewel -->
  <circle cx="200" cy="172" r="7.5" fill="#FDF0B0" opacity="0.92"/>
  <circle cx="200" cy="172" r="4.5" fill="#C9A030"/>
  <circle cx="200" cy="172" r="2"   fill="#FDF0B0" opacity="0.95"/>

  <!-- Highlight specks on petal tips -->
  <circle cx="200" cy="120" r="2.5" fill="#FDF0B0" opacity="0.8"/>
  <circle cx="184" cy="130" r="1.8" fill="#FDF0B0" opacity="0.6"/>
  <circle cx="216" cy="130" r="1.8" fill="#FDF0B0" opacity="0.6"/>
  <circle cx="169" cy="146" r="1.4" fill="#FDF0B0" opacity="0.45"/>
  <circle cx="231" cy="146" r="1.4" fill="#FDF0B0" opacity="0.45"/>
</svg>
